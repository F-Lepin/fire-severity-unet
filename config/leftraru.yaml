# Configuración LEFTRARU — fire_top45 multi-band rasters
# Ajustar tras: python scripts/inspect_fire_rasters.py

data:
  fires_root: "data/raw/fires"
  processed_root: "data/processed"
  patches_root: "data/patches"
  # Rasters fuente ya en WGS84 ~30 m; no reproyectar si copy_to_processed=true
  target_crs: "EPSG:4326"
  target_resolution: 0.00026949458523585647
  skip_align: true

ingest:
  source_glob: "/home/flepin/X_CONGRESO/raster/fire_top45_*.tif"
  band_lulc: 1
  band_dnbr: 2
  band_scar: 3
  copy_to_processed: true   # bandas ya co-registradas en el mismo GeoTIFF

lulc:
  # Clases agregadas del modelo (one-hot)
  classes:
    1: forest
    2: shrubland
    3: grassland
    4: plantation
    5: agriculture
    6: urban
    7: water
    8: bare_other
  combustible_classes: [1, 2, 3, 4]
  # MapBiomas Chile Colección 2 → clases agregadas del modelo
  # Leyenda: https://chile.mapbiomas.org/codigos-de-la-leyenda/
  remap:
    # Bosque (1. Formación boscosa)
    3: 1     # bosque (nivel 2)
    59: 1    # bosque primario
    60: 1    # bosque secundario
    67: 1    # bosque achaparrado
    # Formación natural no boscosa (2)
    10: 3    # nivel 2 herbáceo/natural
    11: 7    # humedal
    12: 3    # pastizal
    63: 3    # estepa
    66: 2    # matorral
    29: 8    # afloramiento rocoso
    # Agropecuaria y silvicultura (3)
    14: 5    # nivel 2 agropecuario
    9: 4     # silvicultura → plantación
    18: 5    # agricultura
    15: 5    # pastura
    # Área sin vegetación (4)
    22: 8    # nivel 2 sin vegetación
    24: 6    # infraestructura → urbano
    23: 8    # arena, playa y duna
    25: 8    # otra área sin vegetación
    61: 8    # salar
    # Cuerpo de agua (5)
    26: 7
    33: 7    # río, lago u océano
    34: 8    # hielo y nieve
    # No observado (6)
    27: 8
    # Códigos raros en top-45 (default conservador)
    79: 8
    80: 8

severity:
  mode: "dnbr_thresholds"
  # Escala de la banda dNBR: 1.0 si valores 0.100–1.300; 0.001 si enteros 100–1300
  dnbr_value_scale: 1.0
  dnbr_nodata: null
  # 4 clases MTBS (dNBR decimal); píxeles < 0.100 dentro de cicatriz → 0 (sin dato)
  class_ranges:
    1: [0.100, 0.269]   # Low
    2: [0.270, 0.439]   # Moderate-low
    3: [0.440, 0.659]   # Moderate-high
    4: [0.660, 1.300]   # High
  class_map:
    0: 0
    1: 1
    2: 2
    3: 3
    4: 4
  class_names:
    0: outside
    1: low
    2: moderate_low
    3: moderate_high
    4: high

patches:
  size: 32
  min_burn_fraction: 0.25
  min_valid_severity_fraction: 0.20
  max_outside_scar_fraction: 0.75
  samples_per_fire: 200
  balance_severity: true
  random_seed: 42

model:
  in_channels: 8
  num_classes: 5   # 0=ignore + 4 severidades
  base_channels: 32
  encoder_depth: 2

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 0
  checkpoint_dir: "checkpoints"
  device: "auto"

validation:
  strategy: "leave_one_fire_out"
  n_folds: 5

interpretability:
  top_k_patches: 50
  confidence_threshold: 0.7
  output_dir: "outputs/interpretability"
