# LEFTRARU — 4 clases MTBS (experimento original)
# Uso: --config config/leftraru_4class.yaml

data:
  fires_root: "data/raw/fires"
  processed_root: "data/processed"
  patches_root: "data/patches"
  target_crs: "EPSG:4326"
  target_resolution: 0.00026949458523585647
  skip_align: true

ingest:
  source_glob: "/home/flepin/X_CONGRESO/raster/fire_top45_*.tif"
  band_lulc: 1
  band_dnbr: 2
  band_scar: 3
  copy_to_processed: true

lulc:
  classes:
    1: forest
    2: shrubland
    3: grassland
    4: plantation
    5: agriculture
    6: urban
    7: water
    8: bare_other
  combustible_classes: [1, 2, 3, 4]
  remap:
    3: 1
    59: 1
    60: 1
    67: 1
    10: 3
    11: 7
    12: 3
    63: 3
    66: 2
    29: 8
    14: 5
    9: 4
    18: 5
    15: 5
    22: 8
    24: 6
    23: 8
    25: 8
    61: 8
    26: 7
    33: 7
    34: 8
    27: 8
    79: 8
    80: 8

severity:
  mode: "dnbr_thresholds"
  dnbr_value_scale: 1.0
  dnbr_nodata: null
  class_ranges:
    1: [0.100, 0.269]
    2: [0.270, 0.439]
    3: [0.440, 0.659]
    4: [0.660, 1.300]
  class_map:
    0: 0
    1: 1
    2: 2
    3: 3
    4: 4
  class_names:
    0: outside
    1: low
    2: moderate_low
    3: moderate_high
    4: high

patches:
  size: 32
  min_burn_fraction: 0.25
  min_valid_severity_fraction: 0.20
  max_outside_scar_fraction: 0.75
  samples_per_fire: 200
  balance_severity: true
  random_seed: 42

model:
  in_channels: 8
  num_classes: 5
  base_channels: 32
  encoder_depth: 2

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  num_workers: 0
  checkpoint_dir: "checkpoints"
  outputs_dir: "outputs"
  device: "auto"

validation:
  strategy: "leave_one_fire_out"
  n_folds: 5

interpretability:
  top_k_patches: 50
  confidence_threshold: 0.7
  output_dir: "outputs/interpretability"
